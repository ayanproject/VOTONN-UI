<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — VOTONN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap"
    rel="stylesheet" />

  <!-- Google Identity Services (OAuth2) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!--
    reCAPTCHA v3 — replace YOUR_RECAPTCHA_SITE_KEY with your real site key.
    Get it from: https://www.google.com/recaptcha/admin/create
    Until you replace it, login still works (captcha is gracefully skipped).
  -->
  

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="page-wrap">

    <!-- Left brand panel -->
    <div class="brand-panel">
      <div class="brand-top">
        <span class="logo-mark">V</span>
        <span class="logo-text">OTONN</span>
      </div>
      <div class="brand-body">
        <h1 class="brand-headline">Your<br />Voice.<br />Your<br />Vote.</h1>
        <p class="brand-sub">Secure, transparent, and democratic.<br />Every ballot counts.</p>
      </div>
      <div class="brand-bottom">
        <div class="stat"><span class="stat-num">2.4M</span><span class="stat-label">Registered Voters</span></div>
        <div class="stat-divider"></div>
        <div class="stat"><span class="stat-num">100%</span><span class="stat-label">Encrypted</span></div>
      </div>
    </div>

    <!-- Right form panel -->
    <div class="form-panel">
      <div class="form-card">
        <div class="form-header">
          <h2 class="form-title">Welcome back</h2>
          <p class="form-sub">Sign in to continue to VOTONN</p>
        </div>

        <!--
          Google OAuth2 Button
          FIX: Instead of a custom button that calls prompt(),
          we use a <div> that Google renders its own button into.
          This avoids the FedCM NetworkError on localhost.
        -->
        <div class="google-btn-wrap">
          <div id="googleBtnContainer"></div>
        </div>

        <div class="divider"><span>or sign in with email</span></div>

        <!-- Login Form -->
        <form id="loginForm" novalidate>

          <!-- Email -->
          <div class="field-group">
            <label class="field-label" for="loginEmail">Email address</label>
            <div class="field-wrap">
              <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                <polyline points="22,6 12,13 2,6" />
              </svg>
              <input type="email" id="loginEmail" class="field-input" placeholder="you@example.com" autocomplete="email"
                required />
            </div>
            <span class="field-error" id="emailError"></span>
          </div>

          <!-- Password -->
          <div class="field-group">
            <label class="field-label" for="loginPassword">Password</label>
            <div class="field-wrap">
              <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
              <input type="password" id="loginPassword" class="field-input" placeholder="Enter your password"
                autocomplete="current-password" required />
              <button type="button" class="eye-btn" id="togglePassword" aria-label="Show password">
                <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
            <span class="field-error" id="passwordError"></span>
          </div>
          <div class="field-group">
  <label class="field-label" for="captchaInput">Security Check</label>
  <div class="field-wrap" style="display: flex; gap: 12px; margin-bottom: 8px;">
    <div style="flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; display: flex; justify-content: center; align-items: center; overflow: hidden; height: 48px;">
      <img id="captchaImage" src="" alt="CAPTCHA loading..." style="height: 100%; width: auto;" />
    </div>
    <button type="button" id="refreshCaptchaBtn" style="background: var(--ink-3); border: 1px solid var(--border); color: var(--muted); border-radius: 10px; padding: 0 16px; cursor: pointer; transition: color 0.2s;">
      ↻
    </button>
  </div>
  <div class="field-wrap">
    <input type="text" id="captchaInput" class="field-input" placeholder="Enter the characters above" required autocomplete="off" />
  </div>
  <span class="field-error" id="captchaError"></span>
</div>

          <!-- Forgot password link -->
          <div class="forgot-row">
            <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
          </div>

          <!-- Submit -->
          <button type="submit" class="submit-btn" id="loginBtn">
            <span class="btn-text">Sign In</span>
            <div class="btn-spinner" id="btnSpinner" style="display:none;"></div>
          </button>

          <p class="signup-link">Don't have an account? <a href="signupIndex.html">Create one</a></p>

        </form>

       
      </div>
    </div>

  </div>

  <!-- IMPORTANT: load auth.js then script.js -->
  <script src="auth.js"></script>
  <script src="script.js"></script>
</body>

</html>
